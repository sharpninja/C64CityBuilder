name: Build and Release C64 City Builder

# Builds the PRG, creates a D64 disk image, takes a VICE screenshot of the
# title screen, and publishes a GitHub Release (with all three files attached)
# whenever a version tag such as v1.0.0 is pushed.
# On every other push / PR the job builds and uploads the artifacts for
# inspection without creating a release.
#
# C64 ROM cache key: vice-c64-roms-3.7.1
# The three ROM files (kernal, basic, chargen) are extracted once from the
# official VICE 3.7.1 source tarball and then cached indefinitely.  They are
# only re-downloaded when the cache key changes (i.e. on a VICE version bump).

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

# VICE version used to source the C64 ROM files
env:
  VICE_VERSION: "3.7.1"
  VICE_ROM_DIR: /home/runner/.cache/vice-roms

jobs:
  build:
    name: Assemble PRG, create D64, screenshot title screen
    runs-on: ubuntu-latest

    permissions:
      contents: write   # required to create GitHub Releases

    steps:
      # ── 1. Check out source ────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install tools ───────────────────────────────────────
      - name: Install cc65, VICE and Xvfb
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cc65 vice xvfb

      # ── 3. Restore cached C64 ROM files ───────────────────────
      # Cache key includes the VICE version so the cache is automatically
      # invalidated if we ever bump VICE_VERSION above.
      - name: Restore C64 ROM cache
        id: rom-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.VICE_ROM_DIR }}
          key: vice-c64-roms-${{ env.VICE_VERSION }}

      # ── 4. Download and extract ROMs (cache miss only) ────────
      # Skipped on a cache hit; the three ROM files total ~20 KB but live
      # inside a ~50 MB source tarball, so caching them pays off quickly.
      - name: Extract C64 ROMs from VICE source tarball
        if: steps.rom-cache.outputs.cache-hit != 'true'
        run: |
          echo "Cache miss – downloading VICE ${{ env.VICE_VERSION }} source tarball…"
          curl -fsSL \
            "https://sourceforge.net/projects/vice-emu/files/releases/vice-${{ env.VICE_VERSION }}.tar.gz/download" \
            -o /tmp/vice-src.tar.gz

          echo "Extracting C64 ROM files (kernal, basic, chargen)…"
          mkdir -p "${{ env.VICE_ROM_DIR }}"
          tar -xzf /tmp/vice-src.tar.gz \
            -C "${{ env.VICE_ROM_DIR }}" \
            --strip-components=3 \
            "vice-${{ env.VICE_VERSION }}/data/C64/kernal" \
            "vice-${{ env.VICE_VERSION }}/data/C64/basic"  \
            "vice-${{ env.VICE_VERSION }}/data/C64/chargen"
          rm /tmp/vice-src.tar.gz

      - name: Verify C64 ROM files
        run: |
          echo "=== C64 ROM files ==="
          ls -lh "${{ env.VICE_ROM_DIR }}/"

      # ── 5. Build citybuilder.prg ───────────────────────────────
      - name: Build PRG
        run: make

      # ── 6. Verify PRG ─────────────────────────────────────────
      - name: Verify PRG header
        run: |
          echo "=== File info ==="
          ls -lh citybuilder.prg
          echo "=== First 16 bytes (should start 01 08 = load addr $0801) ==="
          xxd -l 16 citybuilder.prg

      # ── 7. Create D64 disk image ──────────────────────────────
      - name: Create D64 disk image
        run: |
          # Format a new 1541 disk named "CITYBUILDER" with ID 01
          # then write the PRG as "CITYBUILDER" on the disk.
          c1541 -format "citybuilder,01" d64 citybuilder.d64 \
                -write citybuilder.prg citybuilder

      # ── 8. Verify D64 ─────────────────────────────────────────
      - name: Verify D64 contents
        run: |
          echo "=== D64 file info ==="
          ls -lh citybuilder.d64
          echo "=== Disk directory listing ==="
          c1541 citybuilder.d64 -list

      # ── 9. Screenshot title screen with VICE ──────────────────
      # Run x64sc headlessly under Xvfb.
      #   -warp            maximum emulation speed (no real-time throttle)
      #   -limitcycles N   exit after N CPU cycles (~5 s of C64 time at 1 MHz;
      #                    far more than enough to fully render the title screen
      #                    and wait at the "press any key" prompt)
      #   -exitscreenshot  write a PNG of the current frame on exit
      - name: Screenshot title screen with VICE
        run: |
          # Start Xvfb virtual framebuffer
          Xvfb :99 -screen 0 1024x768x24 -ac &
          XVFB_PID=$!
          sleep 2

          # Run VICE headlessly; exit code may be non-zero due to -limitcycles
          DISPLAY=:99 x64sc \
            -kernal  "${{ env.VICE_ROM_DIR }}/kernal"  \
            -basic   "${{ env.VICE_ROM_DIR }}/basic"   \
            -chargen "${{ env.VICE_ROM_DIR }}/chargen" \
            -warp \
            -limitcycles 5000000 \
            +confirmonexit \
            +saveres \
            +sound \
            -autostart citybuilder.prg \
            -exitscreenshot title-screen.png \
            2>&1 | grep -v "^$" || true

          # Shut down the virtual display
          kill "$XVFB_PID" 2>/dev/null || true

          echo "=== Screenshot info ==="
          ls -lh title-screen.png
          file title-screen.png

      # ── 10. Upload artifacts (available on every run) ─────────
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: citybuilder-${{ github.sha }}
          path: |
            citybuilder.prg
            citybuilder.d64
            title-screen.png

      # ── 11. Create GitHub Release (tagged pushes only) ────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "C64 City Builder ${{ github.ref_name }}" \
            --generate-notes \
            citybuilder.prg#"C64 City Builder PRG (load with LOAD\"*\",8,1 then RUN)" \
            citybuilder.d64#"C64 City Builder D64 disk image (mount in emulator or real hardware)" \
            title-screen.png#"Title screen screenshot (captured by VICE emulator)"
