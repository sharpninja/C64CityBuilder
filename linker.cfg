# C64 City Builder - LD65 Linker Configuration
# Produces a standard C64 PRG file that loads at $0801.
#
# File layout (in output .prg):
#   [0000-0001]  PRGID  : 2-byte load address $01,$08
#   [0801-080C]  PROG   : HEADER segment (BASIC SYS stub, 12 bytes)
#   [080D-....]  PROG   : CODE / RODATA / DATA segments
#   (BSS is not written to file; initialised at runtime)

FEATURES {
    STARTADDRESS: default = $0801;
}

MEMORY {
    ZP:     file = "",  start = $0002, size = $008E, type = rw, define = yes;
    PRGID:  file = %O,  start = $07FF, size = $0002, fill = yes, fillval = $00;
    PROG:   file = %O,  start = $0801, size = $5000, fill = yes, fillval = $00;
}

SEGMENTS {
    ZEROPAGE: load = ZP,    type = zp;
    LOADADDR: load = PRGID, type = ro;
    HEADER:   load = PROG,  type = ro;
    CODE:     load = PROG,  type = ro, define = yes;
    RODATA:   load = PROG,  type = ro;
    DATA:     load = PROG,  type = rw;
    BSS:      load = PROG,  type = bss, define = yes;
}
